<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexAuth - لوحة التحكم</title>
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body class="bg-dark">

  <div class="particles" id="particles"></div>

  <div class="loading-screen" id="loading">
    <div class="spinner"></div>
    <p class="loading-text">جارٍ التحقق من هويتك...</p>
  </div>

  <div id="portal-content" style="display:none; position:relative; z-index:10; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem;">
    <div class="portal-card">
      <div class="portal-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </div>
      <h1 class="portal-title">مرحباً بك!</h1>
      <p class="portal-subtitle" id="user-email">تم تسجيل دخولك بنجاح إلى منصة NexAuth</p>

      <div class="portal-stats">
        <div class="stat-card">
          <div class="stat-icon">🎯</div>
          <div class="stat-count">12</div>
          <div class="stat-label">المهام</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📊</div>
          <div class="stat-count">5</div>
          <div class="stat-label">التقارير</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⚙️</div>
          <div class="stat-count">3</div>
          <div class="stat-label">الإعدادات</div>
        </div>
      </div>

      <button class="btn-signout" id="btn-signout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        تسجيل الخروج
      </button>
    </div>
  </div>

  <script type="module" src="/src/pages/portal.js"></script>
</body>
</html>
